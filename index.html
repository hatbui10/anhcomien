<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết Kế Poster Phật Giáo - Chùa Phúc Minh</title>
    
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #0f172a;
            --panel: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Roboto Slab', serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* THANH ĐIỀU KHIỂN */
        .toolbar {
            width: 100%;
            padding: 15px;
            background: var(--panel);
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add { background: #3b82f6; color: white; }
        .btn-export { background: #16a34a; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* KHU VỰC THIẾT KẾ */
        #canvas-container {
            padding: 40px;
            overflow: auto;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #canvas {
            width: 500px;
            height: 750px;
            background: #fdf6e3; /* Màu giấy cổ */
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 12px double var(--primary);
            background-image: radial-gradient(#fff9e6 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ĐỐI TƯỢNG TRÊN CANVAS */
        .item {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .text-item {
            min-width: 50px;
            padding: 5px;
            outline: 1px dashed transparent;
            word-wrap: break-word;
        }

        .text-item:focus {
            outline: 2px dashed var(--primary);
            background: rgba(212, 175, 55, 0.1);
        }

        .img-item img {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Chế độ đang xuất ảnh (ẩn viền) */
        .exporting .text-item { outline: none !important; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-add" onclick="addText()">➕ Thêm Chữ</button>
    <div class="control-group">
        <label>Ảnh:</label>
        <input type="file" id="imgUpload" accept="image/*">
    </div>
    <div class="control-group">
        <label>Màu:</label>
        <input type="color" id="colorPicker" value="#1e3a8a" oninput="updateStyle()">
    </div>
    <div class="control-group">
        <label>Cỡ:</label>
        <input type="number" id="sizePicker" value="22" min="10" max="100" oninput="updateStyle()">
    </div>
    <button class="btn btn-export" onclick="download()">💾 Xuất Ảnh Sắc Nét</button>
</div>

<div id="canvas-container">
    <div id="canvas">
        <div class="item text-item" style="top:20px; left:50px; width:500px; color:#b45309; font-weight:bold; text-decoration:underline; font-size:24px;">
            THIỆN PHÁP CÚNG DƯỜNG TRAI TĂNG
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    let selectedElement = null;

    // 1. THÊM CHỮ
    function addText() {
        const div = document.createElement("div");
        div.className = "item text-item";
        div.contentEditable = true;
        div.innerText = "Nhấp để nhập nội dung...";
        
        // Thiết lập mặc định
        div.style.top = "150px";
        div.style.left = "150px";
        div.style.width = "300px";
        div.style.color = document.getElementById("colorPicker").value;
        div.style.fontSize = document.getElementById("sizePicker").value + "px";

        canvas.appendChild(div);
        initInteract(div);
        setupSelection(div);
    }

    // 2. THÊM ẢNH
    document.getElementById("imgUpload").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const container = document.createElement("div");
            container.className = "item img-item";
            container.style.width = "150px";
            container.style.top = "100px";
            container.style.left = "100px";

            const img = document.createElement("img");
            img.src = event.target.result;
            
            container.appendChild(img);
            canvas.appendChild(container);
            initInteract(container);
            setupSelection(container);
        };
        reader.readAsDataURL(file);
    });

    // 3. ĐIỀU KHIỂN KÉO THẢ & THAY ĐỔI KÍCH THƯỚC (InteractJS)
    function initInteract(el) {
        interact(el)
            .draggable({
                listeners: {
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    }
                }
            })
            .resizable({
                edges: { left: true, right: true, bottom: true, top: true },
                listeners: {
                    move(event) {
                        let { x, y } = event.target.dataset;
                        x = parseFloat(x) || 0;
                        y = parseFloat(y) || 0;

                        Object.assign(event.target.style, {
                            width: `${event.rect.width}px`,
                            height: `${event.rect.height}px`,
                            transform: `translate(${x + event.deltaRect.left}px, ${y + event.deltaRect.top}px)`
                        });

                        Object.assign(event.target.dataset, {
                            x: x + event.deltaRect.left,
                            y: y + event.deltaRect.top
                        });
                    }
                }
            });
    }

    // 4. QUẢN LÝ LỰA CHỌN
    function setupSelection(el) {
        el.addEventListener('mousedown', () => {
            selectedElement = el;
            // Cập nhật giá trị lên thanh công cụ nếu là text
            if(el.classList.contains('text-item')) {
                document.getElementById("colorPicker").value = rgbToHex(el.style.color);
                document.getElementById("sizePicker").value = parseInt(el.style.fontSize);
            }
            // Đưa lên lớp trên cùng
            document.querySelectorAll('.item').forEach(i => i.style.zIndex = 1);
            el.style.zIndex = 10;
        });
    }

    function updateStyle() {
        if (selectedElement && selectedElement.classList.contains('text-item')) {
            selectedElement.style.color = document.getElementById("colorPicker").value;
            selectedElement.style.fontSize = document.getElementById("sizePicker").value + "px";
        }
    }

    // 5. XUẤT ẢNH
    function download() {
        canvas.classList.add('exporting');
        html2canvas(canvas, {
            scale: 3, // Xuất ảnh độ phân giải cao để in ấn
            useCORS: true,
            logging: false
        }).then(resultCanvas => {
            const link = document.createElement("a");
            link.download = "ThienPhapCungDuong.png";
            link.href = resultCanvas.toDataURL("image/png");
            link.click();
            canvas.classList.remove('exporting');
        });
    }

    // Hàm phụ chuyển đổi màu
    function rgbToHex(rgb) {
        if (!rgb) return "#1e3a8a";
        if (rgb.startsWith('#')) return rgb;
        const rgbValues = rgb.match(/\d+/g);
        if (!rgbValues) return "#1e3a8a";
        return "#" + rgbValues.slice(0, 3).map(x => {
            const hex = parseInt(x).toString(16);
            return hex.length === 1 ? "0" + hex : hex;
        }).join("");
    }

    // Khởi tạo cho các phần tử có sẵn
    document.querySelectorAll('.item').forEach(initInteract);
    document.querySelectorAll('.item').forEach(setupSelection);
</script>

</body>
</html>
