<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Poster Editor Pro - Sync Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --sidebar-w: 220px; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { height: 60px; background: #1e293b; display: flex; align-items: center; gap: 12px; padding: 0 20px; border-bottom: 1px solid #334155; z-index: 100; }
        .btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; color: white; transition: 0.2s; }
        .btn-add { background: #3b82f6; }
        .btn-layer { background: #8b5cf6; }
        .btn-save { background: #f59e0b; }
        .btn-export { background: #16a34a; }
        .btn:hover { opacity: 0.8; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: var(--sidebar-w); background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow-y: auto; }
        .slide-thumb { width: 100%; aspect-ratio: 5/7; background: #eee; border: 3px solid #475569; border-radius: 4px; cursor: pointer; position: relative; overflow: hidden; transition: 0.2s; flex-shrink: 0; }
        .slide-thumb.active { border-color: var(--primary) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); transform: scale(1.02); }
        .thumb-preview { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
        .slide-label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); color: white; padding: 2px 6px; font-size: 10px; border-radius: 10px; }
        .delete-slide { position: absolute; top: 5px; right: 5px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 3px; font-size: 10px; cursor: pointer; display: none; z-index: 5; }
        .slide-thumb:hover .delete-slide { display: block; }
        .editor-area { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 30px; overflow: auto; background: #020617; }
        #canvas { width: 500px; height: 700px; background: white; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); flex-shrink: 0; }
        .item { position: absolute; box-sizing: border-box; touch-action: none; cursor: move; }
        .item.selected { outline: 1.5px solid var(--primary); }
        .size-badge { position: absolute; bottom: -22px; right: 0; background: rgba(0,0,0,0.8); color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; pointer-events: none; display: none; white-space: nowrap; z-index: 20; font-family: monospace; }
        .item.selected .size-badge { display: block; }
        .resize-handle { display: none; position: absolute; width: 8px; height: 8px; background: white; border: 1px solid var(--primary); z-index: 10; }
        .item.selected .resize-handle { display: block; }
        .rotate-handle { display: none; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: white; border: 2px solid var(--primary); border-radius: 50%; cursor: crosshair; }
        .item.selected .rotate-handle { display: block; }
        .text-content { outline: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; word-break: break-word; color: black; }
        .exporting .rotate-handle, .exporting .resize-handle, .exporting .size-badge { display: none !important; }
        .exporting .selected { outline: none !important; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-add" onclick="createNewText()">➕ Thêm Chữ</button>
    <input type="file" id="imgUpload" style="display:none" multiple accept="image/*">
    <button class="btn btn-add" onclick="document.getElementById('imgUpload').click()">🖼️ Thêm Ảnh</button>
    <button class="btn btn-layer" onclick="bringToFront()">🔝 Ra phía trước</button>
    <div style="flex-grow: 1;"></div> 
    <input type="color" id="colorPicker" value="#000000">
    <input type="number" id="sizePicker" value="24" style="width: 50px;">
    <button class="btn btn-save" onclick="saveData(true)">💾 LƯU THỦ CÔNG</button>
    <button class="btn btn-export" onclick="download()">🖼️ Xuất Ảnh</button>
</div>

<div class="main-container">
    <div class="sidebar" id="sidebar">
        <button class="btn btn-add" onclick="addNewSlide()" style="margin-bottom:10px">+ Trang Mới</button>
        <div id="slides-list"></div>
    </div>
    <div class="editor-area">
        <div id="canvas" onclick="deselectAll(event)"></div>
    </div>
</div>

<script>
    let pages = [{ id: Date.now(), items: [], thumbnail: "" }];
    let currentPageIndex = 0;
    let selectedEl = null;
    let maxZIndex = 100;
    const canvas = document.getElementById('canvas');

    const dbName = "PosterDB_v5_Final"; 
    const storeName = "projects";

    // 1. Khởi tạo Database
    function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName);
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });
    }

    // 2. Chờ ảnh tải xong
    async function waitImages() {
        const imgs = canvas.querySelectorAll("img");
        await Promise.all(Array.from(imgs).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(r => { img.onload = r; img.onerror = r; });
        }));
    }

    // 3. LOGIC LƯU TRỮ ĐỒNG BỘ
    async function saveData(showAlert = false) {
        // A. Thu thập dữ liệu từ Canvas hiện tại
        const items = [];
        document.querySelectorAll('.item').forEach(el => {
            const img = el.querySelector('img');
            const text = el.querySelector('.text-content');
            items.push({
                type: img ? 'image' : 'text',
                content: img ? img.src : text.innerHTML,
                x: parseFloat(el.getAttribute('data-x')) || 0,
                y: parseFloat(el.getAttribute('data-y')) || 0,
                w: el.offsetWidth,
                h: el.offsetHeight,
                angle: parseFloat(el.getAttribute('data-angle')) || 0,
                z: el.style.zIndex,
                color: img ? null : text.style.color,
                fontSize: img ? null : parseInt(text.style.fontSize)
            });
        });

        // B. Cập nhật vào mảng pages
        pages[currentPageIndex].items = items;

        // C. Chụp ảnh Thumbnail cho Sidebar
        const temp = selectedEl; if(temp) temp.classList.remove('selected');
        canvas.classList.add('exporting');
        await waitImages();
        const cv = await html2canvas(canvas, { scale: 0.1, logging: false });
        pages[currentPageIndex].thumbnail = cv.toDataURL('image/jpeg', 0.5);
        canvas.classList.remove('exporting');
        if(temp) temp.classList.add('selected');

        // D. Ghi vào IndexedDB
        const db = await initDB();
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(pages, "current_project");
        
        renderSidebar();
        if(showAlert) alert("Đã lưu dữ liệu thành công!");
    }

    window.onload = async () => {
        const db = await initDB();
        const tx = db.transaction(storeName, "readonly");
        const request = tx.objectStore(storeName).get("current_project");
        request.onsuccess = () => {
            if (request.result && request.result.length > 0) pages = request.result;
            loadSlide(0);
        };
    };

    function loadSlide(i) {
        currentPageIndex = i;
        canvas.innerHTML = '';
        if (pages[i] && pages[i].items) {
            pages[i].items.forEach(it => createItem(it.type, it.content, it));
        }
        renderSidebar();
    }

    function createItem(type, content, data) {
        const div = document.createElement('div');
        div.className = 'item';
        div.style.width = data.w + 'px';
        div.style.height = data.h + 'px';
        div.style.zIndex = data.z || ++maxZIndex;
        div.innerHTML = `
            <div class="rotate-handle"></div>
            <div class="resize-handle nw"></div><div class="resize-handle ne"></div>
            <div class="resize-handle sw"></div><div class="resize-handle se"></div>
            <div class="resize-handle n"></div><div class="resize-handle s"></div>
            <div class="resize-handle w"></div><div class="resize-handle e"></div>
            <div class="size-badge">${Math.round(data.w)} x ${Math.round(data.h)}</div>
            ${type === 'text' 
                ? `<div class="text-content" contenteditable="true" style="color:${data.color || '#000'}; font-size:${data.fontSize || 24}px">${content}</div>`
                : `<img src="${content}" style="width:100%; height:100%; pointer-events:none; object-fit:fill;">` 
            }
        `;
        canvas.appendChild(div);
        setTransform(div, data.x, data.y, data.angle || 0);
        makeInteractable(div);
        
        if(type === 'text') {
            div.querySelector('.text-content').addEventListener('blur', () => saveData());
        }
        div.addEventListener('mousedown', (e) => { e.stopPropagation(); selectElement(div); });
    }

    function makeInteractable(el) {
        interact(el).draggable({
            listeners: { 
                move(e) {
                    let x = (parseFloat(el.getAttribute('data-x')) || 0) + e.dx;
                    let y = (parseFloat(el.getAttribute('data-y')) || 0) + e.dy;
                    setTransform(el, x, y, el.getAttribute('data-angle'));
                },
                end() { saveData(); }
            }
        }).resizable({
            edges: { left: '.w, .nw, .sw', right: '.e, .ne, .se', bottom: '.s, .sw, .se', top: '.n, .nw, .ne' },
            listeners: { 
                move(e) {
                    let x = (parseFloat(el.getAttribute('data-x')) || 0) + e.deltaRect.left;
                    let y = (parseFloat(el.getAttribute('data-y')) || 0) + e.deltaRect.top;
                    el.style.width = e.rect.width + 'px';
                    el.style.height = e.rect.height + 'px';
                    el.querySelector('.size-badge').innerText = `${Math.round(e.rect.width)} x ${Math.round(e.rect.height)}`;
                    setTransform(el, x, y, el.getAttribute('data-angle'));
                },
                end() { saveData(); }
            }
        });
        
        interact(el.querySelector('.rotate-handle')).draggable({
            onmove: (e) => {
                const rect = el.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI + 90;
                setTransform(el, el.getAttribute('data-x'), el.getAttribute('data-y'), angle);
            },
            onend: () => { saveData(); }
        });
    }

    function setTransform(el, x, y, angle) {
        el.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
        el.setAttribute('data-x', x); el.setAttribute('data-y', y); el.setAttribute('data-angle', angle);
    }

    function renderSidebar() {
        const list = document.getElementById('slides-list');
        list.innerHTML = '';
        pages.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `slide-thumb ${i === currentPageIndex ? 'active' : ''}`;
            div.innerHTML = `<img src="${p.thumbnail || ''}" class="thumb-preview"><div class="slide-label">${i + 1}</div>
                             <button class="delete-slide" onclick="deleteSlide(event, ${i})">✕</button>`;
            div.onclick = () => { if(i !== currentPageIndex) { saveData(); loadSlide(i); } };
            list.appendChild(div);
        });
    }

    async function addNewSlide() {
        await saveData();
        pages.push({ id: Date.now(), items: [], thumbnail: "" });
        loadSlide(pages.length - 1);
        saveData();
    }

    async function deleteSlide(e, i) {
        e.stopPropagation();
        if(pages.length > 1) {
            pages.splice(i, 1);
            currentPageIndex = 0;
            loadSlide(0);
            saveData();
        }
    }

    function createNewText() {
        createItem('text', "Nhập chữ...", { x:100, y:100, w:200, h:50, color: '#000000', fontSize: 24 });
        saveData();
    }

    document.getElementById("imgUpload").addEventListener("change", function(e) {
        const files = Array.from(e.target.files);
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                createItem('image', ev.target.result, { x: 50+(index*20), y: 50+(index*20), w: 300, h: 450 });
                saveData();
            };
            reader.readAsDataURL(file);
        });
        e.target.value = "";
    });

    function selectElement(el) { 
        deselectAll(); 
        selectedEl = el; 
        el.classList.add('selected');
        const text = el.querySelector('.text-content');
        if(text) {
            document.getElementById('colorPicker').value = rgbToHex(text.style.color);
            document.getElementById('sizePicker').value = parseInt(text.style.fontSize);
        }
    }
    
    function deselectAll(e) { 
        if(e && e.target !== canvas && !e.target.classList.contains('editor-area')) return; 
        document.querySelectorAll('.item').forEach(el => el.classList.remove('selected')); 
        selectedEl = null; 
    }

    function download() {
        deselectAll(); canvas.classList.add('exporting');
        html2canvas(canvas, { scale: 2, useCORS: true }).then(cv => {
            const link = document.createElement('a');
            link.download = `poster-${Date.now()}.png`;
            link.href = cv.toDataURL(); link.click();
            canvas.classList.remove('exporting');
        });
    }

    function bringToFront() { if (selectedEl) { selectedEl.style.zIndex = ++maxZIndex; saveData(); } }

    window.addEventListener('keydown', (e) => { 
        if((e.key === "Delete" || e.key === "Backspace") && selectedEl && document.activeElement.contentEditable !== "true") { 
            selectedEl.remove(); selectedEl = null; saveData(); 
        } 
    });

    document.getElementById('colorPicker').addEventListener('input', (e) => {
        if(selectedEl && selectedEl.querySelector('.text-content')) {
            selectedEl.querySelector('.text-content').style.color = e.target.value;
            saveData();
        }
    });

    document.getElementById('sizePicker').addEventListener('input', (e) => {
        if(selectedEl && selectedEl.querySelector('.text-content')) {
            selectedEl.querySelector('.text-content').style.fontSize = e.target.value + 'px';
            saveData();
        }
    });

    function rgbToHex(rgb) {
        if(!rgb) return "#000000";
        if(rgb.startsWith('#')) return rgb;
        const rgbValues = rgb.match(/\d+/g);
        if(!rgbValues) return "#000000";
        return "#" + rgbValues.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
    }
</script>
</body>
</html>
